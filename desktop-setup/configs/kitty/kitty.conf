
# ------------------- REMOTE CONTROL -----------------------
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# ---------------------- ATAJOS ----------------------------

# ATAJOS DE PESTAÑAS
map ctrl+t launch --type=tab --cwd=current
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# ATAJOS DE NAVEGACIÓN ENTRE VENTANAS
map ctrl+right neighboring_window right
map ctrl+left neighboring_window left  
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down

# DIVIDIR TERMINAL
map ctrl+enter launch --location=hsplit --cwd=current



# ------------------- ESTILOS ------------------------------

# Padding uniforme en todos los lados
single_window_margin_width 20

# personalización de la barra de pestañas
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal

# ratón
mouse_hide_wait -1

# desplazamiento hacia atrás
scrollback_lines 5000
wheel_scroll_multiplier 3.0

# diseño de ventana
remember_window_size  no
initial_window_width  1200
initial_window_height 750
window_border_width 2pt
window_padding_width 0
window_margin_width 2
hide_window_decorations yes

# personalización del cursor
# bloque / rayo / subrayado
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0
shell_integration no-cursor

# opacidad y desenfoque de fondo
background_opacity  0.8
background_blur 12

# fuente - TODAS las variantes con el mismo patrón
font_family JetBrainsMonoNL Nerd Font SemiBold
bold_font JetBrainsMonoNL Nerd Font ExtraBold
italic_font JetBrainsMonoNL Nerd Font SemiBold Italic
bold_italic_font JetBrainsMonoNL Nerd Font ExtraBold Italic
font_size 14.0

# BEGIN_KITTY_THEME
# Dracula
# include current-theme.conf
# TEMA DRALIZADO: 

# Tema Dracula para Kitty

# Colores básicos
foreground #f8f8f2
background #282a36

# Colores del cursor
cursor #f8f8f2
cursor_text_color #282a36

# Colores de selección
selection_foreground #282a36
selection_background #f8f8f2

# Colores de URL
url_color #8be9fd

# Colores del borde de ventana
active_border_color #3b8eea
inactive_border_color #6272a4

# Colores de pestañas
active_tab_foreground #282a36
active_tab_background #bd93f9
inactive_tab_foreground #f8f8f2
inactive_tab_background #44475a
